<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Coffee Pay</title>
    <!-- CDN های معتبر و جایگزین -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="application/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .coffee-card img { transition: transform 0.3s ease; }
        .coffee-card:hover img { transform: scale(1.05); }
        .logo-overlay { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.8); border-radius: 50%; padding: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body class="text-gray-900">
    <header class="bg-white shadow-sm p-4 flex justify-between items-center px-8 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="images/arc-logo.jpg" alt="Arc Logo" class="w-10 h-10 rounded-full">
            <h1 class="text-2xl font-bold text-gray-800">Arc Coffee</h1>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold transition shadow-lg">
            Connect Wallet
        </button>
    </header>

    <main class="max-w-6xl mx-auto mt-12 px-4">
        <div id="menuView">
            <h2 class="text-3xl font-bold text-center mb-2">Smart Coffee Menu</h2>
            <p class="text-center text-gray-600 mb-12">Fast payments with USDC on Arc Network</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Americano -->
                <div class="coffee-card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 flex flex-col">
                    <div class="relative h-64 overflow-hidden"><img src="images/americano.jpg" class="w-full h-full object-cover"><img src="images/arc-logo.jpg" class="logo-overlay"></div>
                    <div class="p-6 text-center">
                        <h3 class="text-xl font-bold mb-2">Americano</h3>
                        <p class="text-blue-600 font-bold text-2xl mb-4">5 USDC</p>
                        <button onclick="selectCoffee('Americano', 5, 1)" class="w-full bg-gray-900 text-white py-3 rounded-xl hover:bg-gray-800 transition">Select & Pay</button>
                    </div>
                </div>
                <!-- Cappuccino -->
                <div class="coffee-card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 flex flex-col">
                    <div class="relative h-64 overflow-hidden"><img src="images/cappuccino.jpg" class="w-full h-full object-cover"><img src="images/arc-logo.jpg" class="logo-overlay"></div>
                    <div class="p-6 text-center">
                        <h3 class="text-xl font-bold mb-2">Cappuccino</h3>
                        <p class="text-blue-600 font-bold text-2xl mb-4">8 USDC</p>
                        <button onclick="selectCoffee('Cappuccino', 8, 2)" class="w-full bg-gray-900 text-white py-3 rounded-xl hover:bg-gray-800 transition">Select & Pay</button>
                    </div>
                </div>
                <!-- Latte -->
                <div class="coffee-card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 flex flex-col">
                    <div class="relative h-64 overflow-hidden"><img src="images/latte.jpg" class="w-full h-full object-cover"><img src="images/arc-logo.jpg" class="logo-overlay"></div>
                    <div class="p-6 text-center">
                        <h3 class="text-xl font-bold mb-2">Latte Macchiato</h3>
                        <p class="text-blue-600 font-bold text-2xl mb-4">10 USDC</p>
                        <button onclick="selectCoffee('Latte', 10, 3)" class="w-full bg-gray-900 text-white py-3 rounded-xl hover:bg-gray-800 transition">Select & Pay</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="paymentArea" class="hidden mt-16 bg-white p-8 rounded-3xl shadow-2xl max-w-lg mx-auto border-2 border-blue-100 text-center">
            <button onclick="backToMenu()" class="text-gray-500 mb-4 hover:text-black flex items-center gap-2">← Back to Menu</button>
            <h3 class="text-2xl font-bold mb-4">Checkout Information</h3>
            <div id="coffeeDetails" class="mb-6 text-lg"></div>
            <div class="flex flex-col items-center mb-6 bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-gray-200">
                <div id="qrcode" class="bg-white p-2 border-4 border-white shadow-sm"></div>
            </div>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Payment Link:</label>
                    <div class="bg-gray-50 p-3 mt-1 rounded-lg flex justify-between items-center border">
                        <code class="text-xs text-blue-800 truncate" id="payLink">Loading...</code>
                        <button onclick="copyText('payLink')" class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs font-bold whitespace-nowrap">Copy</button>
                    </div>
                </div>
                <button id="payNowBtn" onclick="payNow()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-xl hover:bg-blue-700 transition shadow-lg mt-4">
                    Confirm & Pay Now
                </button>
            </div>
        </div>
    </main>

    <footer class="mt-24 bg-gray-900 text-white py-12 px-8">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-gray-800 pt-8">
            <div class="flex items-center gap-3">
                <img src="images/avatar.jpg" class="w-10 h-10 rounded-full border border-gray-700 shadow-sm">
                <p class="text-gray-400">Project by <span class="text-white font-bold">amirrezaeian</span></p>
            </div>
            <div class="flex gap-4 text-sm">
                <a href="https://x.com/amirrezaeian75" target="_blank" class="text-blue-400 font-bold">Twitter</a>
                <a href="https://github.com/amirrezaeian1375/arc-coffee-pay" target="_blank" class="text-gray-400">GitHub</a>
                <a href="https://testnet.arcscan.app/" target="_blank" class="text-gray-400">Explorer</a>
            </div>
        </div>
    </footer>

    <script>
        // بررسی لود شدن کتابخانه
        if (typeof ethers === 'undefined') {
            alert("Warning: Ethers library could not be loaded. Please check your internet connection or refresh the page.");
        }

        const contractAddress = "0x3fa1A7926dC029bF7Fb2d6386EC94640532b351b";
        const abi = ["function buyCoffee(uint8 coffeeType) public payable"];
        let provider, signer, contract, selectedType, selectedPrice;

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    // استفاده از window.ethers برای اطمینان از دسترسی
                    provider = new window.ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    contract = new window.ethers.Contract(contractAddress, abi, signer);
                    
                    const btn = document.getElementById('connectBtn');
                    btn.innerText = accounts[0].substring(0,6) + "..." + accounts[0].substring(38);
                    btn.className = "bg-green-600 text-white px-6 py-2 rounded-full font-bold shadow-lg";
                    return true;
                } catch (e) {
                    alert("Connection Error: " + e.message);
                    return false;
                }
            } else {
                alert("Please install MetaMask or Rabby!");
                return false;
            }
        }

        function selectCoffee(name, price, type) {
            selectedType = type; selectedPrice = price;
            document.getElementById('menuView').classList.add('hidden');
            document.getElementById('paymentArea').classList.remove('hidden');
            document.getElementById('coffeeDetails').innerHTML = `Item: <b>${name}</b><br><span class="text-2xl text-blue-600 font-bold">${price} USDC</span>`;
            
            const payUrl = window.location.origin + window.location.pathname + `?type=${type}&name=${name}&price=${price}`;
            document.getElementById('payLink').innerText = payUrl;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: payUrl, width: 180, height: 180 });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToMenu() {
            document.getElementById('menuView').classList.remove('hidden');
            document.getElementById('paymentArea').classList.add('hidden');
            window.history.replaceState({}, '', window.location.pathname);
        }

        async function payNow() {
            if (!contract) {
                const ok = await connectWallet();
                if (!ok) return;
            }

            try {
                // ارسال تراکنش با قیمت مشخص شده
                const tx = await contract.buyCoffee(selectedType, { 
                    value: window.ethers.utils.parseEther(selectedPrice.toString()) 
                });
                alert("Transaction sent! Wait for confirmation...");
                await tx.wait();
                alert("Success! ☕️ Enjoy your coffee!");
                backToMenu();
            } catch (e) {
                alert("Payment Error: " + e.message);
            }
        }

        function copyText(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert("Copied!");
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('type')) selectCoffee(params.get('name'), params.get('price'), params.get('type'));
        };
    </script>
</body>
</html>
